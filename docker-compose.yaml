# docker-compose.yaml
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d bookdb']
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: book-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: bookdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: book-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: book-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.${NODE_ENV:-development}   # ← đọc đúng file theo NODE_ENV
    environment:
      NODE_ENV: ${NODE_ENV:-development} # ← truyền NODE_ENV vào container
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: